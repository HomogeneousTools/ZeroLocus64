name: CI

on:
  push:
  pull_request:

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          python -m pip install black

      - name: Check Python formatting
        run: git ls-files -z '*.py' | xargs -0 --no-run-if-empty python -m black --check

  julia-formatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Check Julia formatting
        run: |
          julia -e 'using Pkg; Pkg.activate(mktempdir()); Pkg.add("JuliaFormatter"); using JuliaFormatter; ok = format("julia"; overwrite=false, verbose=true); exit(ok ? 0 : 1)'

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python[test]'

      - name: Run Python tests
        run: python -m pytest python/tests

  julia-tests:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - julia-version: '1.9'
            allow-failure: false
          - julia-version: '1.10'
            allow-failure: false
          - julia-version: '1.11'
            allow-failure: false
          - julia-version: '1.12'
            allow-failure: false
          - julia-version: '1.13-nightly'
            allow-failure: true
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Run Julia tests
        run: julia --project=julia -e 'using Pkg; Pkg.instantiate(); Pkg.test()'